<div class="gallery">
    <figure>
    <img src="assets/webb-first-deep-field.jpg" alt="Webbs First Deep Field NIRCam Image">
    <figcaption>
        <p>Webb’s First Deep Field (NIRCam Image)</p>
        <p>NASA’s James Webb Space Telescope has produced the deepest and sharpest infrared image of the distant universe to date. Known as Webb’s First Deep Field, this image of galaxy cluster SMACS 0723 is overflowing with detail.</p>
        <p>Image Credit: Image: NASA, ESA, CSA, STScI</p>
        <p>Published: July 11th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/NGC_3132.jpg" alt="Southern Ring Nebula NIRCam Image">
    <figcaption>
        <p>Southern Ring Nebula (NIRCam Image)</p>
        <p>The bright star at the center of NGC 3132, while prominent when viewed by NASA’s Webb Telescope in near-infrared light, plays a supporting role in sculpting the surrounding nebula.</p>
        <p>Image Credit: NASA, ESA, CSA, STScI</p>
        <p>Published: July 12th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/Stephans_Quintet_Galaxy_group.jpg" alt="Stephans Quintet NIRCam and MIRI Composite Image">
    <figcaption>
        <p>Stephan’s Quintet (NIRCam and MIRI Composite Image)</p>
        <p>An enormous mosaic of Stephan’s Quintet is the largest image to date from NASA’s James Webb Space Telescope, covering about one-fifth of the Moon’s diameter.</p>
        <p>Image Credit: NASA, ESA, CSA, STScI</p>
        <p>Published: July 12th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/carinanebula3.jpg" alt="Cosmic Cliffs in the Carina Nebula NIRCam Image">
    <figcaption>
        <p>“Cosmic Cliffs” in the Carina Nebula (NIRCam Image)</p>
        <p>What looks much like craggy mountains on a moonlit evening is actually the edge of a nearby, young, star-forming region NGC 3324 in the Carina Nebula.</p>
        <p>Image Credit: NASA, ESA, CSA, STScI</p>
        <p>Published: July 12th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/Cartwheel-Galaxy-NIRCam-and-MIRI-Composite-Image.png" alt="Cartwheel Galaxy NIRCam and MIRI Composite Image">
    <figcaption>
        <p>Cartwheel Galaxy (NIRCam and MIRI Composite Image)</p>
        <p>This image of the Cartwheel and its companion galaxies is a composite from Webb’s Near-Infrared Camera (NIRCam) and Mid-Infrared Instrument (MIRI), which reveals details that are difficult to see in the individual images alone.</p>
        <p>Image Credit: NASA, ESA, CSA, STScI, Webb ERO Production Team</p>
        <p>Published: August 2nd, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/Tarantula-Nebula-NIRCam-Image.png" alt="Tarantula Nebula NIRCam Image">
    <figcaption>
        <p>Tarantula Nebula (NIRCam Image)</p>
        <p>In this mosaic image stretching 340 light-years across, Webb’s Near-Infrared Camera (NIRCam) displays the Tarantula Nebula star-forming region in a new light, including tens of thousands of never-before-seen young stars that were previously shrouded in cosmic dust.</p>
        <p>Image Credit: NASA, ESA, CSA, STScI, Webb ERO Production Team</p>
        <p>Published: September 6th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/Neptune-NIRCam.png" alt="Neptune NIRCam">
    <figcaption>
        <p>Neptune (NIRCam)</p>
        <p>This image of the Neptune system, captured by Webb’s Near-Infrared Camera (NIRCam), reveals stunning views of the planet’s rings, which have not been seen with this clarity in more than three decades.</p>
        <p>Image Credit: NASA, ESA, CSA, STScI; Image Processing: Joseph DePasquale (STScI), Naomi Rowe-Gurney (NASA-GSFC)</p>
        <p>Published: September 21st, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/Webb-View-of-Dimorphos-Ejecta-NIRCam.jfif" alt="Webb View of Dimorphos Ejecta NIRCam">
    <figcaption>
        <p>Webb View of Dimorphos Ejecta (NIRCam)</p>
        <p>This image from NASA’s James Webb Space Telescope’s Near-Infrared Camera (NIRCam) instrument shows Dimorphos, the asteroid moonlet in the double-asteroid system of Didymos, about 4 hours after NASA’s Double Asteroid Redirection Test (DART) made impact.</p>
        <p>Image Credit: NASA, ESA, CSA, Cristina Thomas (Northern Arizona University), Ian Wong (NASA-GSFC); Image Processing: Joseph DePasquale (STScI)</p>
        <p>Published: September 29th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/Pillars-of-Creation-NIRCam-Image.png" alt="Pillars of Creation NIRCam Image">
    <figcaption>
        <p>Pillars of Creation (NIRCam Image)</p>
        <p>The Pillars of Creation are set off in a kaleidoscope of color in NASA’s James Webb Space Telescope’s near-infrared-light view.</p>
        <p>Image Credit: NASA, ESA, CSA, STScI; Image Processing: Joseph DePasquale (STScI), Anton Koekemoer (STScI), Alyssa Pagan (STScI)</p>
        <p>Published: October 19th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/Dwarf-Galaxy-WLM-NIRCam-Image.png" alt="Dwarf Galaxy WLM NIRCam Image">
    <figcaption>
        <p>Dwarf Galaxy WLM (NIRCam Image)</p>
        <p>A portion of the dwarf galaxy Wolf–Lundmark–Melotte (WLM) captured by the James Webb Space Telescope’s Near-Infrared Camera.</p>
        <p>Image Credit: NASA, ESA, CSA, Kristen McQuinn (Rutgers University); Image Processing: Zoltan Levay (STScI)</p>
        <p>Published: November 9th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/L1527-and-Protostar-NIRCam-Image.png" alt="L1527 and Protostar NIRCam Image">
    <figcaption>
        <p>L1527 and Protostar (NIRCam Image)</p>
        <p>The protostar within the dark cloud L1527, shown in this image from NASA’s James Webb Space Telescope Near-Infrared Camera (NIRCam), is embedded within a cloud of material feeding its growth.</p>
        <p>Image Credit: NASA, ESA, CSA, STScI; Image Processing: Joseph DePasquale (STScI), Alyssa Pagan (STScI), Anton Koekemoer (STScI)</p>
        <p>Published: November 16th, 2022</p>
    </figcaption>
    </figure>
    <figure>
    <img src="assets/NGC-346-NIRCam-Image.png" alt="NGC 346 NIRCam Image">
    <figcaption>
        <p>NGC 346 (NIRCam Image)</p>
        <p>NGC 346, shown here in this image from NASA’s James Webb Space Telescope Near-Infrared Camera (NIRCam), is a dynamic star cluster that lies within a nebula 200,000 light years away.</p>
        <p>Image Credit: NASA, ESA, CSA, Olivia Jones (UK ATC), Guido De Marchi (ESTEC), Margaret Meixner (USRA); Image Processing: Alyssa Pagan (STScI), Nolan Habel (USRA), Laura Lenkić (USRA), Laurie Chu (NASA Ames)</p>
        <p>Published: January 11th, 2023</p>
    </figcaption>
    </figure>
