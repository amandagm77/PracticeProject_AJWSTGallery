<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact: A JWST Gallery</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="hero">
    <header>A James Webb Space Telescope Gallery</header>
    <br>
     <nav><a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html"target="_blank">Contact</a>
    </nav>
    <h1>Contact</h1>
    <br>
    <h2>Want to learn more? Contact us here!</h2>
    </div>
<section>
    <form>
        <fieldset>
            <legend>Credentials:</legend>
        <input type="text"placeholder="Enter Name">
        <br>
        <input type="email"placeholder="Enter E-mail">
        </fieldset>
        <br>
        <fieldset>
            <legend>I am:</legend>
            <input type="radio" id="student" name="I-am" value="student">A Student
            <br>
            <input type="radio" id="teacher" name="I-am" value="teacher">An Educator
            <br>
            <input type="radio" id="business" name="I-am" value="business">A Business
            <br>
            <input type="radio" id="other" name="I-am" value="other">Other
            <br>
        </fieldset>
        <br>
         <fieldset>
            <legend>Message:</legend>
        <label for="Inquiry Type">Type of Inquiry:</label>
        <select name="Inquiry Type" id="Inquiry Type">
            <option value="Question">Question</option>
            <option value="School">School</option>
            <option value="Business">Business</option>
            <option value="Other">Other</option>
            </select><br>
            <textarea placeholder="What can we help you with?"name="Message" id="Message" textarea rows="10" cols="50"></textarea>
        </fieldset>
        <br>
        <input type="submit" value="Submit">
        
    </form>
</section>
<br>
<footer>
   © 2026 A JWST Gallery 
</footer>
</body>
</html>
